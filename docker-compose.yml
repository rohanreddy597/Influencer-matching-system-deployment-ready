version: '3.8'

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: influencer_matching_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: influencer_matching
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: influencer_matching_app
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://admin:password123@mongodb:27017/influencer_matching?authSource=admin
      SESSION_SECRET: ${SESSION_SECRET:-your-session-secret-key}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    name: influencer_matching_network
