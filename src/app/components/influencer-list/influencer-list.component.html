<app-brand-side-bar>
  <div class="container-fluid py-4" style="background: linear-gradient(135deg, #f5f3ff, #e0e7ff); min-height: 100vh;">
    
    <!-- Influencer List Heading -->
    <h2 class="text-center mb-4" style="color: black; font-weight: 700; font-size: 2rem;">
      Influencers List
    </h2>

    <!-- Filters -->
    <div class="filter-section container">
      <div class="row justify-content-center mb-4">
        <div class="col-md-2">
          <select class="form-select" [(ngModel)]="selectedLocation">
            <option value="">All Locations</option>
            <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
          </select>
        </div>

        <div class="col-md-2">
          <select class="form-select" [(ngModel)]="selectedCategory">
            <option value="">All Categories</option>
            <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
          </select>
        </div>

        <div class="col-md-2">
          <input type="number" class="form-control" [(ngModel)]="minSubscribers" placeholder="Min Subscribers">
        </div>

        <div class="col-md-2">
          <input type="number" class="form-control" [(ngModel)]="maxSubscribers" placeholder="Max Subscribers">
        </div>

        <div class="col-md-2">
          <button class="btn btn-primary w-100" (click)="getInfluencers()">
            <i class="bi bi-filter"></i> Apply Filters
          </button>
        </div>
      </div>
    </div>

    <!-- No Data Available -->
    <div *ngIf="influencers.length === 0" class="alert alert-info text-center">
      No influencers found.
    </div>

    <!-- Influencer Cards -->
    <div class="container">
      <div class="row">
        <div *ngFor="let influencer of influencers" class="col-md-6 mb-4">
          <div class="card shadow-sm border-0" style="background-color: white; border-radius: 12px; padding: 20px;">
            
            <!-- Full-Width Name Header -->
            <div class="card-header text-center" 
                 style="background: #4338ca; color: white; font-weight: bold; font-size: 1.5rem; padding: 10px; border-radius: 10px 10px 0 0;">
              {{ influencer.channelName }}
            </div>

            <div class="row g-0 align-items-center p-3">
              
              <!-- Bigger Square Profile Image -->
              <div class="col-4 text-center">
                <img [src]="influencer.profileImage" class="profile-img img-fluid" alt="Profile Image" 
                     style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px;">
              </div>

              <div class="col-8">
                <div class="card-body">
                  <p class="card-text"><strong>Subscribers:</strong> {{ influencer.subscribers | number }}</p>
                  <p class="card-text"><strong>Views:</strong> {{ influencer.totalViews | number }}</p>
                  <p class="card-text"><strong>Videos:</strong> {{ influencer.videoCount }}</p>
                  <p class="card-text"><strong>Category:</strong> {{ influencer.category }}</p>
                  <p class="card-text"><strong>Location:</strong> {{ influencer.location }}</p>

                  <button class="btn btn-success mt-2 w-100" (click)="sendRequest(influencer._id)" style="border-radius: 0;">
                    <i class="bi bi-envelope"></i> Send Request
                  </button>
                  
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</app-brand-side-bar>
