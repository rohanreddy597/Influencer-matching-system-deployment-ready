
<app-side-bar [class.collapsed]="isSidebarCollapsed" class="sidebar">
  <!-- Main Content -->
  <div class="main-content">
    <main class="p-6 bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen">
      <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12 animate-fade-in">
          <h1 class="text-4xl font-bold text-gray-900 mb-2">
            Welcome, <span class="bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">{{ influencerData.channelName }}</span>!
          </h1>
          <p class="text-gray-600">Your Channel Dashboard</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid md:grid-cols-3 gap-6 mb-8 animate-slide-up">
          <!-- Subscribers Card -->
          <div class="bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 p-8 border border-gray-100">
            <div class="flex items-center gap-4 mb-4">
              <div class="p-3 bg-indigo-100 rounded-lg">
                <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 10a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
              </div>
              <div>
                <p class="text-sm text-gray-600 font-semibold">Subscribers</p>
                <p class="text-2xl font-bold text-gray-900">{{ influencerData.subscribers | number }}</p>
              </div>
            </div>
          </div>

          <!-- Total Views Card -->
          <div class="bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 p-8 border border-gray-100">
            <div class="flex items-center gap-4 mb-4">
              <div class="p-3 bg-purple-100 rounded-lg">
                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
              </div>
              <div>
                <p class="text-sm text-gray-600 font-semibold">Total Views</p>
                <p class="text-2xl font-bold text-gray-900">{{ influencerData.totalViews | number }}</p>
              </div>
            </div>
          </div>

          <!-- Video Count Card -->
          <div class="bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 p-8 border border-gray-100">
            <div class="flex items-center gap-4 mb-4">
              <div class="p-3 bg-pink-100 rounded-lg">
                <svg class="w-6 h-6 text-pink-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
              </div>
              <div>
                <p class="text-sm text-gray-600 font-semibold">Videos</p>
                <p class="text-2xl font-bold text-gray-900">{{ influencerData.videoCount }}</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4 justify-center flex-wrap">
          <button 
            (click)="navigateToProfile()" 
            class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg hover:shadow-lg transform hover:scale-105 transition-all duration-300"
          >
            <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            Go to Profile
          </button>
          <button 
            (click)="navigateToRequests()" 
            class="px-8 py-3 bg-white text-indigo-600 font-semibold rounded-lg border-2 border-indigo-600 hover:bg-indigo-50 transition-all duration-300"
          >
            <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 00.948-.684l1.498-4.493a1 1 0 011.502-.684l1.498 4.493a1 1 0 00.948.684H17a2 2 0 012 2v2a1 1 0 001 1h1a1 1 0 011 1v3a1 1 0 01-1 1h-1a1 1 0 00-1 1v1a2 2 0 01-2 2h-2.28a1 1 0 00-.948.684l-1.498 4.493a1 1 0 01-1.502.684l-1.498-4.493a1 1 0 00-.948-.684H5a2 2 0 01-2-2v-2a1 1 0 00-1-1H1a1 1 0 01-1-1v-3a1 1 0 011-1h1a1 1 0 001-1V5z"></path>
            </svg>
            View Requests
          </button>
        </div>
      </div>
    </main>
  </div>
</app-side-bar>
