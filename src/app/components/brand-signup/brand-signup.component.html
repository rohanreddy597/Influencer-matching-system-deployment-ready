<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent mb-2">
        InfluencerHub
      </h1>
      <h2 class="text-2xl font-bold text-gray-900">Brand Sign Up</h2>
      <p class="text-gray-600 mt-2">Create your account to find influencers</p>
    </div>

    <!-- Success Message -->
    <div *ngIf="signupSuccess" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg animate-fade-in">
      <div class="flex items-center gap-3">
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <div>
          <h3 class="font-semibold text-green-800">Success!</h3>
          <p class="text-green-700 text-sm">Your brand has been registered. Redirecting to login...</p>
        </div>
      </div>
    </div>

    <!-- Form -->
    <form *ngIf="!signupSuccess" (ngSubmit)="onSubmit()" #signupForm="ngForm" class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <!-- Username Field -->
      <div class="mb-6">
        <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
          Username
        </label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-gray-400"
          placeholder="Enter your username"
        />
      </div>

      <!-- Password Field -->
      <div class="mb-6">
        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
          Password
        </label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-gray-400"
          placeholder="Enter your password"
        />
      </div>

      <!-- Brand Name Field -->
      <div class="mb-8">
        <label for="brandName" class="block text-sm font-semibold text-gray-700 mb-2">
          Brand Name
        </label>
        <input
          type="text"
          id="brandName"
          [(ngModel)]="brandName"
          name="brandName"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-gray-400"
          placeholder="Enter your brand name"
        />
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span class="text-red-700 text-sm">{{ errorMessage }}</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="w-full px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg hover:shadow-lg transform hover:scale-105 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Create Account
      </button>

      <!-- Sign In Link -->
      <p class="text-center text-gray-600 mt-6">
        Already have an account? 
        <a href="/brand/login" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">
          Sign In
        </a>
      </p>
    </form>
  </div>
</div>
